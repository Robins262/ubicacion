<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartir ubicación</title>
</head>
<body>

    <h2>Compartir ubicación</h2>

    <button onclick="enviarUbicacion()">
        Compartir ubicación
    </button>

    <p id="estado"></p>

    <script>

    function enviarUbicacion() {

        const estado = document.getElementById("estado");

        if (!navigator.geolocation) {
            estado.innerHTML = "Tu navegador no soporta geolocalización.";
            return;
        }

        estado.innerHTML = "Obteniendo ubicación...";

        navigator.geolocation.getCurrentPosition(

            function(pos) {

                const datos = new URLSearchParams();
                datos.append("latitud", pos.coords.latitude);
                datos.append("longitud", pos.coords.longitude);

                fetch(
                    "https://script.google.com/macros/s/AKfycbyWbT_EVQz0CMMKnVxVF0B6wMp4L-6buEsEblvFy6ihYgDe27tXlbIwqSQmaRaMG9t3vQ/exec",
                    {
                        method: "POST",
                        body: datos
                    }
                )
                .then(response => response.text())
                .then(data => {
                    console.log(data);
                    estado.innerHTML = "Ubicación enviada correctamente.";
                })
                .catch(error => {
                    console.error(error);
                    estado.innerHTML = "Error al enviar la ubicación.";
                });

            },

            function(error) {
                estado.innerHTML = "No se concedió permiso de ubicación.";
            }

        );
    }

    </script>

</body>
</html>
